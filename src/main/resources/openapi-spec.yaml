openapi: 3.0.0
info:
  title: Nevis Search API
  version: 1.0.0
  description: WealthTech search API for advisors to search across clients and their documents.
security:
  - basicAuth: []
paths:
  /clients:
    post:
      summary: Create a client
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                email:
                  type: string
                  format: email
                description:
                  type: string
                social_links:
                  type: array
                  items:
                    type: string
              required:
                - first_name
                - last_name
                - email
      responses:
        "201":
          description: Client created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Client"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized - invalid or missing credentials
  /clients/{id}/documents:
    post:
      summary: Create a document for a client
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, content]
              properties:
                title:
                  type: string
                content:
                  type: string
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "400":
          description: Invalid request body
        "401":
          description: Unauthorized - invalid or missing credentials
        "404":
          description: Client not found
  /search:
    get:
      summary: Search across clients and documents
      parameters:
        - name: q
          in: query
          required: true
          description: Search query (text match for clients, semantic match for documents)
          schema:
            type: string
        - name: summary
          in: query
          required: false
          description: When true, includes an LLM-generated summary for each matching document
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Search results (clients and documents)
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: "#/components/schemas/ClientResult"
                    - $ref: "#/components/schemas/DocumentResult"
        "400":
          description: Missing or blank query parameter
        "401":
          description: Unauthorized - invalid or missing credentials
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  schemas:
    Client:
      type: object
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        description:
          type: string
        social_links:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Document:
      type: object
      properties:
        id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        title:
          type: string
        content:
          type: string
        created_at:
          type: string
          format: date-time
    ClientResult:
      type: object
      properties:
        type:
          type: string
          enum: [client]
        id:
          type: string
          format: uuid
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          format: email
        description:
          type: string
        social_links:
          type: array
          items:
            type: string
    DocumentResult:
      type: object
      properties:
        type:
          type: string
          enum: [document]
        id:
          type: string
          format: uuid
        client_id:
          type: string
          format: uuid
        title:
          type: string
        created_at:
          type: string
          format: date-time
        summary:
          type: string
          nullable: true
          description: LLM-generated summary (only present when summary=true)
