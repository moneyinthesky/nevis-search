services:
  app:
    build: .
    container_name: nevis-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/nevis
      DB_USER: nevis
      DB_PASSWORD: nevis
      BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-admin}
      BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg17
    container_name: nevis-postgres
    environment:
      POSTGRES_DB: nevis
      POSTGRES_USER: nevis
      POSTGRES_PASSWORD: nevis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nevis"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
